name: frontend_agricare
description: Home Gardening Recommendation System + AgriCare App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  fluttertoast: ^9.0.0
  carousel_slider: ^5.1.1

  # HTTP & API
  http: ^1.2.0
  dio: ^5.3.3

  # Real-time Communication
  socket_io_client: ^3.1.3

  # Location & Weather
  geolocator: ^11.0.0

  # Image Handling
  image_picker: ^1.2.1
  cached_network_image: ^3.3.0
  flutter_image_compress: ^2.1.0

  # File Handling
  file_picker: ^10.3.7
  path_provider: ^2.1.1

  # State Management
  provider: ^6.1.1
  get: ^4.6.6
  get_storage: ^2.1.1

  # Storage
  shared_preferences: ^2.2.2
  cookie_jar: ^4.0.8

  # Utilities
  intl: ^0.20.2
  timeago: ^3.5.0
  permission_handler: ^12.0.1

  # External app launching
  url_launcher: ^6.3.0

  # WhatsApp icon
  font_awesome_flutter: ^10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/agri-icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/pic1.jpg