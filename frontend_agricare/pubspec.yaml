name: frontend_agricare
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.3.3
  
  # Real-time WebSocket Chat
  socket_io_client: ^3.1.3
  
  # Image Handling
  image_picker: ^1.2.1
  cached_network_image: ^3.3.0
  
  # File Handling
  file_picker: ^10.3.7
  path_provider: ^2.1.1
  
  # State Management
  provider: ^6.1.1
  get: ^4.6.6
  get_storage: ^2.1.1
  
  # Storage (Removed firebase storage, using backend storage)
  shared_preferences: ^2.2.2
  
  # Date & Time
  intl: ^0.20.2
  timeago: ^3.5.0
  
  # UI Utilities
  flutter_spinkit: ^5.2.0
  fluttertoast: ^9.0.0
  
  # Image Compression
  flutter_image_compress: ^2.1.0
  
  # Permissions
  permission_handler: ^12.0.1
  cookie_jar: ^4.0.8
  carousel_slider: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/pic1.jpg
    - assets/images/